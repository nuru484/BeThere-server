name: CI

on:
  push:
    branches: [main]
  pull_request:

# Superseded runs (force-pushes to the same ref) are cancelled instead of
# burning runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bethere_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Fail the build on a known HIGH/critical advisory in a production
      # dependency (dev-only and moderate advisories do not block). Dependabot
      # (see .github/dependabot.yml) opens the bump PRs; this gate stops a new
      # one from shipping unnoticed.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      # Schema drift gate: a schema.prisma edit committed without a migration
      # fails here instead of surfacing at deploy time. prisma migrate diff
      # does not create its shadow database, so create it first.
      - name: Create drift-check database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE bethere_drift_check;"
      - name: Check migrations match schema
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code
        env:
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bethere_drift_check
      - run: npm test

  # The image must build on every change: the entrypoint runs the Prisma CLI
  # and the runtime stage's dependency set can silently rot otherwise.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t bethere-server:ci .
